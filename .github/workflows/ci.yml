name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gastronomica
          POSTGRES_PASSWORD: gastronomica
          POSTGRES_DB: gastronomica
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gastronomica -d gastronomica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://gastronomica:gastronomica@localhost:5432/gastronomica

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
