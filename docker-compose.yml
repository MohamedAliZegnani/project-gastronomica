services:
  postgres:
    image: postgres:16-alpine
    container_name: gastronomica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gastronomica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gastronomica}
      POSTGRES_DB: ${POSTGRES_DB:-gastronomica}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gastronomica_pg:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gastronomica} -d ${POSTGRES_DB:-gastronomica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional full stack (Phase 1+) — build after images are defined
